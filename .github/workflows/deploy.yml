name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - "docker-compose.yml"

env:
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push nextjs
        uses: docker/build-push-action@v5
        with:
          context: .
          file: dashboard/Dockerfile
          target: nextjs
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/nextjs:latest
            ${{ env.IMAGE_BASE }}/nextjs:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha,scope=smarthub
          cache-to: type=gha,scope=smarthub,mode=max

      - name: Build & push wsserver
        uses: docker/build-push-action@v5
        with:
          context: .
          file: dashboard/Dockerfile
          target: wsserver
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/wsserver:latest
            ${{ env.IMAGE_BASE }}/wsserver:${{ github.sha }}
          cache-from: type=gha,scope=smarthub
          cache-to: type=gha,scope=smarthub,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GH_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_PAT,GH_ACTOR
          script: |
            set -e
            cd /opt/smarthub
            git fetch origin && git reset --hard origin/main
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
            docker compose pull nextjs wsserver
            docker compose up -d --no-deps nextjs wsserver
            docker image prune -f
