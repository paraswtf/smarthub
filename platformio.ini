; ESP Hub — PlatformIO project configuration
; Flash with: pio run --target upload
; Monitor with: pio device monitor

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Serial monitor baud rate
monitor_speed = 115200

; Partition scheme — use "min_spiffs" to maximise app space
board_build.partitions = min_spiffs.csv

lib_deps =
    ; WebSocket client
    links2004/WebSockets @ ^2.4.1
    ; JSON serialisation
    bblanchon/ArduinoJson @ ^7.2.0
    ; DNS server for captive portal
    ; (bundled with ESP32 Arduino core — no separate dep needed)
