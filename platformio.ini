; ESP Hub — PlatformIO project configuration
; Run from repo root: pio run --target upload
; Monitor from repo root: pio device monitor

[platformio]
src_dir     = firmware/src
include_dir = firmware/include

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Serial monitor baud rate
monitor_speed = 115200
monitor_filters = direct

; Partition scheme — use "min_spiffs" to maximise app space
board_build.partitions = min_spiffs.csv

lib_deps =
    ; WebSocket client
    links2004/WebSockets @ ^2.4.1
    ; JSON serialisation
    bblanchon/ArduinoJson @ ^7.2.0
