name: smarthub

services:
    mongodb:
        image: mongo:7
        restart: unless-stopped
        ports:
            - "127.0.0.1:27017:27017"
        volumes:
            - mongodb_data:/data/db
        command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
        healthcheck:
            test: >
                mongosh --quiet --eval "
                  try { rs.status().ok && quit(0) }
                  catch(e) { rs.initiate({_id:'rs0', members:[{_id:0, host:'mongodb:27017'}]}).ok ? quit(0) : quit(1) }
                "
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    redis:
        image: redis:7-alpine
        restart: unless-stopped
        ports:
            - "127.0.0.1:6379:6379"
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

    nextjs:
        image: ghcr.io/paraswtf/smarthub/nextjs:${IMAGE_TAG:-latest}
        build:
            context: .
            dockerfile: dashboard/Dockerfile
            target: nextjs
            args:
                - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3000}
        restart: unless-stopped
        ports:
            - "127.0.0.1:3002:3000"
        volumes:
            - firmware_data:/data/firmware
        environment:
            - DATABASE_URL=mongodb://mongodb:27017/esphub?replicaSet=rs0&directConnection=true
            - WS_INTERNAL_URL=http://wsserver:4001
            - REDIS_URL=redis://redis:6379
            - AUTH_SECRET=${AUTH_SECRET}
            - WS_SECRET=${WS_SECRET}
            - AUTH_GOOGLE_CLIENT_ID=${AUTH_GOOGLE_CLIENT_ID:-}
            - AUTH_GOOGLE_CLIENT_SECRET=${AUTH_GOOGLE_CLIENT_SECRET:-}
            - BREVO_API_KEY=${BREVO_API_KEY:-}
            - BREVO_SENDER_EMAIL=${BREVO_SENDER_EMAIL:-}
            - NEXTAUTH_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3000}
            - AUTH_TRUST_HOST=true
            - NODE_ENV=production
            - HOSTNAME=0.0.0.0
        depends_on:
            mongodb:
                condition: service_healthy

    wsserver:
        image: ghcr.io/paraswtf/smarthub/wsserver:${IMAGE_TAG:-latest}
        build:
            context: .
            dockerfile: dashboard/Dockerfile
            target: wsserver
        restart: unless-stopped
        ports:
            - "127.0.0.1:4002:4001"
        environment:
            - DATABASE_URL=mongodb://mongodb:27017/esphub?replicaSet=rs0&directConnection=true
            - WS_PORT=4001
            - WS_SECRET=${WS_SECRET}
            - NODE_ENV=production
        depends_on:
            mongodb:
                condition: service_healthy

volumes:
    mongodb_data:
    firmware_data:
